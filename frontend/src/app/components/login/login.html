<div class="login-page">
  <div class="container login-container">

    <!-- Login Card -->
    <div class="login-card" *ngIf="modo === 'login'">
      <h3 class="text-center">Iniciar Sesión</h3>

      <form (ngSubmit)="iniciarSesion()">
        <div class="mb-3">
          <label for="correoLogin" class="form-label">Correo electrónico</label>
          <input type="email" id="correoLogin" name="correoLogin" class="form-control" [(ngModel)]="login.correo"
            required />
        </div>

        <div class="mb-3">
          <label for="passwordLogin" class="form-label">Contraseña</label>
          <input type="password" id="passwordLogin" name="passwordLogin" class="form-control"
            [(ngModel)]="login.password" required />
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Iniciar Sesión
        </button>

        <div class="separador-login">
          <span>o</span>
        </div>

        <div class="google-login-box">
          <div id="googleButton"></div>
        </div>

        <p *ngIf="errorLogin" class="text-danger text-center mt-2">
          {{ errorLogin }}
        </p>
      </form>

      <p class="text-center mt-3 text-muted">
        ¿No tienes cuenta?
        <a href="#" (click)="mostrarRegistro($event)">Regístrate</a>
      </p>
    </div>

    <!-- Register Card -->
    <div class="login-card" *ngIf="modo === 'registro'">
      <h3 class="text-center">Crear Cuenta</h3>

      <form (ngSubmit)="registrarUsuario()">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" class="form-control" [(ngModel)]="registro.nombre" required />
        </div>

        <div class="mb-3">
          <label for="correo" class="form-label">Correo electrónico</label>
          <input type="email" id="correo" name="correo" class="form-control" [(ngModel)]="registro.correo" required />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" name="password" class="form-control" [(ngModel)]="registro.password"
            required />
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
            [(ngModel)]="registro.confirmPassword" required />
        </div>

        <p *ngIf="errorPasswordMatch" class="text-danger text-center mt-2">
          Las contraseñas no coinciden.
        </p>

        <button type="submit" class="btn btn-success w-100">
          Registrarse
        </button>

        <p *ngIf="errorRegister" class="text-danger text-center mt-2">
          {{ errorRegister }}
        </p>

        <p *ngIf="mensajeRegistro" class="text-success text-center mt-2">
          {{ mensajeRegistro }}
        </p>
      </form>

      <p class="text-center mt-3 text-muted">
        ¿Ya tienes cuenta?
        <a href="#" (click)="mostrarLogin($event)">Inicia sesión</a>
      </p>
    </div>

  </div>
</div>
