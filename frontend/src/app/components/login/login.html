<div class="container mt-5">
  <h2>Iniciar sesión</h2>

  <input [(ngModel)]="usuario" placeholder="Usuario" class="form-control mb-2">
  <input [(ngModel)]="password" type="password" placeholder="Contraseña" class="form-control mb-2">

  <button class="btn btn-primary" (click)="login()">Ingresar</button>
</div>
