<nav class="navbar navbar-expand-lg bg-white border-bottom py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#" (click)="irADashboard($event)">
      <img src="assets/img/EasyCommerceCarrito.png" alt="Logo EasyCommerce" height="30">
      <span class="fw-bold">
        Easy<span class="text-muted">Commerce</span>
      </span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="#" (click)="irAProductos($event)">
            Productos
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#" (click)="irAServicios($event)">
            Servicios
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#" (click)="irANosotros($event)">
            Nosotros
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#" (click)="irAPromociones($event)">
            Promociones
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center navbar-right">
        <div class="search-box">
          <input class="form-control search-input" type="search" placeholder="Buscar un producto..."
            [(ngModel)]="terminoBusqueda" (keyup.enter)="buscarProducto()" />

          <button class="search-btn" type="button" (click)="buscarProducto()">
            <i class="fa fa-search"></i>
          </button>
        </div>

        <!-- Si NO hay sesión -->
        <button *ngIf="!logueado" class="btn btn-dark rounded-pill px-4" type="button" (click)="cambiarVista('login')">
          Iniciar sesión
        </button>

        <!-- Si SÍ hay sesión -->
        <div *ngIf="logueado" class="navbar-icons">

          <span class="nombre-usuario fw-semibold text-dark">
            {{ obtenerNombreUsuario() }}
          </span>

          <a href="#" class="icon-link text-dark" (click)="cambiarVista('carrito'); $event.preventDefault()"
            title="Carrito">
            <i class="fa fa-shopping-cart"></i>
          </a>

          <a href="#" class="icon-link text-dark" (click)="cambiarVista('favoritos'); $event.preventDefault()"
            title="Favoritos">
            <i class="fa fa-heart"></i>
          </a>

          <div class="dropdown user-dropdown">
            <span class="text-dark user-icon" role="button" id="dropdownUser" data-bs-toggle="dropdown"
              aria-expanded="false" title="Usuario">
              <i class="fa fa-user"></i>
            </span>

            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownUser">
              <li>
                <a class="dropdown-item" href="#" (click)="irAConfiguracion($event)">
                  Configuración
                </a>
              </li>

              <li>
                <hr class="dropdown-divider">
              </li>

              <li>
                <a class="dropdown-item" href="#" (click)="logout($event)">
                  Cerrar sesión
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
