<!-- CONTENIDO -->
<section class="py-5 favoritos-page">
  <div class="container">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-2">
      <div>
        <h3 class="fw-bold mb-1">Mis Favoritos</h3>
        <p class="text-muted mb-0">
          Productos guardados para revisar o comprar más adelante.
        </p>
      </div>
    </div>

    <div *ngIf="favoritos.length === 0" class="favoritos-empty text-center text-muted">
      <i class="fa fa-heart fa-3x mb-3"></i>
      <h5 class="fw-semibold">No tienes productos favoritos</h5>
      <p class="mb-0">
        Cuando agregues productos a favoritos, aparecerán en esta sección.
      </p>
    </div>

    <div class="row g-4" *ngIf="favoritos.length > 0">
      <div class="col-12 col-sm-6 col-lg-4" *ngFor="let producto of favoritos">
        <div class="card h-100 border-0 shadow-sm favorito-card">

          <div class="position-relative">
            <img
              [src]="producto.imagen"
              [alt]="producto.nombre"
              class="product-img card-img-top"
            >

            <button
              class="btn-fav-remove"
              title="Quitar de favoritos"
              (click)="eliminarFavorito(producto.id)"
            >
              <i class="fa fa-heart"></i>
            </button>
          </div>

          <div class="card-body d-flex flex-column">
            <h5 class="card-title fw-bold">
              {{ producto.nombre }}
            </h5>

            <p class="text-muted small flex-grow-1">
              {{ producto.descripcion }}
            </p>

            <p class="fw-bold fs-5 mb-3">
              ${{ producto.precio.toFixed(2) }}
            </p>

            <div class="d-flex gap-2">
              <button
                class="btn btn-dark rounded-pill w-100"
                (click)="agregarAlCarrito(producto)"
              >
                <i class="fa fa-shopping-cart me-1"></i>
                Agregar
              </button>

              <button
                class="btn btn-outline-danger rounded-pill"
                title="Eliminar favorito"
                (click)="eliminarFavorito(producto.id)"
              >
                <i class="fa fa-trash"></i>
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>
</section>
