<div class="container mt-4">
  <h1 class="text-center mb-4">Dashboard</h1>

  <div class="row">

    <!-- Tarjeta productos -->
    <div class="col-md-4">
      <div class="card text-white bg-primary mb-3">
        <div class="card-body">
          <h5 class="card-title">Productos</h5>
          <p class="card-text">Gestión de productos del inventario</p>
        </div>
      </div>
    </div>

    <!-- Tarjeta stock -->
    <div class="col-md-4">
      <div class="card text-white bg-success mb-3">
        <div class="card-body">
          <h5 class="card-title">Stock</h5>
          <p class="card-text">Control de inventario disponible</p>
        </div>
      </div>
    </div>

    <!-- Tarjeta sistema -->
    <div class="col-md-4">
      <div class="card text-white bg-dark mb-3">
        <div class="card-body">
          <h5 class="card-title">Sistema</h5>
          <p class="card-text">Panel de administración</p>
        </div>
      </div>
    </div>

  </div>
</div>
