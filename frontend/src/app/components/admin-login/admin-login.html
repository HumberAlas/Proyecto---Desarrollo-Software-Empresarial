<div class="admin-login-page">
  <div class="container login-container">

    <div class="login-card p-4 shadow rounded">
      <div class="admin-icon text-center mb-3">
        <i class="fa fa-user-shield"></i>
      </div>

      <h3 class="text-center mb-4">
        Iniciar Sesión Administrador
      </h3>

      <form (ngSubmit)="iniciarSesionAdmin()">
        <div class="mb-3">
          <label for="correoAdmin" class="form-label">
            Correo electrónico
          </label>

          <input
            type="email"
            id="correoAdmin"
            name="correoAdmin"
            class="form-control"
            [(ngModel)]="correoAdmin"
            required
          />
        </div>

        <div class="mb-3">
          <label for="passwordAdmin" class="form-label">
            Contraseña
          </label>

          <input
            type="password"
            id="passwordAdmin"
            name="passwordAdmin"
            class="form-control"
            [(ngModel)]="passwordAdmin"
            required
          />
        </div>

        <button
          type="submit"
          class="btn btn-dark w-100"
          [disabled]="cargando"
        >
          <span *ngIf="!cargando">Iniciar Sesión</span>
          <span *ngIf="cargando">Validando...</span>
        </button>

        <p *ngIf="errorAdminLogin" class="text-danger text-center mt-2">
          {{ errorAdminLogin }}
        </p>
      </form>

      <p class="text-center text-muted small mt-3 mb-0">
        Acceso restringido únicamente para administradores autorizados.
      </p>
    </div>

  </div>
</div>
